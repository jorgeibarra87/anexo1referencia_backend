spring.application.name=anexo1_referenciacontrareferencia
server.port=8086

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_referencia}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

security.jwt.key.private=${JWT_SECRET:123}

eureka.client.enabled=false
